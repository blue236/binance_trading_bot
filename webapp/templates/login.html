<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BTB Login</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f6f7fb;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);width:min(360px,92vw)}
    input,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ddd}
    button{background:#2b6cb0;color:#fff;border:none}
    .err{color:#b42318;font-size:.9rem;margin-top:8px}
  </style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="off">
    <h3>Binance Trading Bot Login</h3>
    <input id="username" name="username" placeholder="Username" required />
    <input id="password" name="password" type="password" placeholder="Password" required />
    <button id="loginBtn" type="submit">Login</button>
    <div class="err" id="loginErr">{% if error %}{{ error }}{% endif %}</div>
  </form>

  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginErr');
    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      const u = document.getElementById('username').value || '';
      const p = document.getElementById('password').value || '';
      try {
        const r = await fetch('/login', {
          method: 'POST',
          headers: {
            'x-btb-user': u,
            'x-btb-pass': p,
          },
          credentials: 'same-origin',
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok || !j.ok) {
          err.textContent = (j && j.error) ? j.error : 'Login failed';
          return;
        }
        window.location.href = j.redirect || '/';
      } catch (e) {
        err.textContent = 'Login request failed';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
